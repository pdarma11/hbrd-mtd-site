<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5C518"/>
      <stop offset="100%" stop-color="#E8A800"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#181818"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Gold border -->
  <rect width="32" height="32" rx="7" fill="none" stroke="url(#gold)" stroke-width="1.2" opacity="0.6"/>

  <!-- Bold H -->
  <rect x="7" y="7" width="4" height="18" rx="1.2" fill="url(#gold)"/>
  <rect x="21" y="7" width="4" height="18" rx="1.2" fill="url(#gold)"/>
  <rect x="7" y="13.5" width="18" height="4" rx="1.2" fill="url(#gold)"/>
</svg>
